<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — SkillSwap</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<!-- Edit Profile Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Edit Profile</h3>
    <div id="editMsg"></div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="editName" maxlength="100">
    </div>
    <div class="form-group">
      <label>City</label>
      <input type="text" id="editLocation" maxlength="100">
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" style="flex:1" onclick="saveProfile()">Save Changes</button>
      <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Upload Video Modal -->
<div class="modal-overlay" id="videoModal">
  <div class="modal">
    <h3>Upload Video Lecture</h3>
    <div id="videoMsg"></div>
    <div class="form-group">
      <label>Select Skill</label>
      <select id="videoSkillId"></select>
    </div>
    <div class="form-group">
      <label>Video Title</label>
      <input type="text" id="videoTitle" placeholder="e.g. Introduction to Python" maxlength="200">
    </div>
    <div class="form-group">
      <label>Video File <span style="font-weight:400;color:var(--text-3)">(mp4, webm — max 200MB)</span></label>
      <input type="file" id="videoFile" accept="video/mp4,video/webm,video/ogg,video/quicktime"
        style="padding:8px;border:1.5px dashed var(--border);border-radius:var(--r-md);background:var(--surface-2);cursor:pointer;">
    </div>
    <div id="uploadProgress" style="display:none;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-3);margin-bottom:6px;">
        <span>Uploading...</span>
        <span id="uploadPct">0%</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" style="flex:1" onclick="uploadVideo()">Upload Video</button>
      <button class="btn btn-outline" onclick="closeVideoModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="container" style="max-width:720px;">

  <!-- Profile Hero Card -->
  <div class="profile-hero-card reveal" id="profileCard">
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
      <div class="profile-avatar-xl" id="avatarEl"></div>
      <div>
        <div class="profile-name" id="profileName"></div>
        <div class="profile-email" id="profileEmail"></div>
        <div class="profile-location" id="profileLocation"></div>
      </div>
    </div>
    <button class="btn btn-outline btn-sm"
      style="background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);color:white;"
      onclick="openEditModal()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:0.9em;height:0.9em;vertical-align:-0.1em;display:inline-block"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit Profile</button>
  </div>

  <!-- Skills Section -->
  <div class="section-card reveal">
    <div class="section-header">
      <div class="section-title" id="skillCountTitle">My Skills</div>
      <button class="btn btn-warning btn-sm" onclick="openVideoModal()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1.3em;height:1.3em;vertical-align:-0.2em;display:inline-block"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg> Upload Video</button>
    </div>

    <div class="form-row mb-4">
      <div class="form-group">
        <label>Skill name</label>
        <input type="text" id="skillName" placeholder="e.g. Python, Guitar, Photography..." maxlength="100">
      </div>
      <div class="form-group" style="max-width:200px;">
        <label>Type</label>
        <select id="skillType">
          <option value="offer">I can offer this</option>
          <option value="want">I want to learn this</option>
        </select>
      </div>
      <button class="btn btn-primary btn-sm" style="align-self:flex-end;" onclick="addSkill()">Add Skill</button>
    </div>

    <div id="skillMsg"></div>
    <div id="skillList"></div>
  </div>

  <!-- My Videos Section -->
  <div class="section-card reveal">
    <div class="section-header">
      <div class="section-title">My Video Lectures</div>
    </div>
    <div id="myVideoList"></div>
  </div>

</div>

<script src="../app.js"></script>
<script>
  buildNavbar('profile');
  requireLogin();

  const me = getUser();
  let mySkills = [];

  // ---- Profile hero ----
  function renderProfile() {
    document.getElementById('avatarEl').textContent    = getInitials(me.name);
    document.getElementById('profileName').textContent = me.name;
    document.getElementById('profileEmail').textContent = me.email;
    document.getElementById('profileLocation').textContent = me.location ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:0.85em;height:0.85em;vertical-align:-0.1em;display:inline-block"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg> ' + me.location : '';
  }

  // ---- Edit profile ----
  function openEditModal() {
    document.getElementById('editName').value     = me.name;
    document.getElementById('editLocation').value = me.location || '';
    clearMsg('editMsg');
    document.getElementById('editModal').classList.add('open');
  }
  function closeEditModal() { document.getElementById('editModal').classList.remove('open'); }

  async function saveProfile() {
    const name     = document.getElementById('editName').value.trim();
    const location = document.getElementById('editLocation').value.trim();
    if (!name) { showError('editMsg', 'Name is required.'); return; }
    const data = await apiCall('/auth/edit', 'PUT', { user_id: me.id, name, location });
    if (!data.success) { showError('editMsg', data.error); return; }
    me.name = data.name; me.location = data.location;
    saveUser(me);
    closeEditModal();
    renderProfile();
    buildNavbar('profile');
    showToast('Profile updated!', 'success');
  }

  // ---- Skills ----
  async function loadSkills() {
    showSpinner('skillList');
    const data = await apiCall('/skills/mine?user_id=' + me.id);
    if (!data.success) return;
    mySkills = data.skills;
    document.getElementById('skillCountTitle').textContent =
      `My Skills (${mySkills.length})`;

    if (mySkills.length === 0) {
      document.getElementById('skillList').innerHTML =
        `<div class="empty-state" style="padding:24px 0;">
           <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:2em;height:2em;display:block;margin:0 auto"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg></div>
           <h3>No skills yet</h3>
           <p>Add your first skill above to start swapping!</p>
         </div>`;
      populateSkillDropdown();
      return;
    }

    document.getElementById('skillList').innerHTML = mySkills.map(skill => `
      <div class="skill-row">
        <div class="skill-row-left">
          <span class="badge ${skill.type==='offer'?'badge-offer':'badge-want'}">
            ${skill.type==='offer'?'Offering':'Wanting'}
          </span>
          <span class="skill-row-name">${skill.name}</span>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteSkill(${skill.id})">Delete</button>
      </div>`).join('');

    populateSkillDropdown();
  }

  async function addSkill() {
    const name = document.getElementById('skillName').value.trim();
    const type = document.getElementById('skillType').value;
    if (!name) { showError('skillMsg', 'Please enter a skill name.'); return; }
    const data = await apiCall('/skills', 'POST', { user_id: me.id, name, type });
    if (!data.success) { showError('skillMsg', data.error); return; }
    document.getElementById('skillName').value = '';
    clearMsg('skillMsg');
    showToast('Skill added!', 'success');
    loadSkills();
  }

  async function deleteSkill(skillId) {
    if (!confirm('Delete this skill? Any videos for it will also be deleted.')) return;
    await apiCall('/skills/' + skillId, 'DELETE', { user_id: me.id });
    showToast('Skill removed.');
    loadSkills();
    loadMyVideos();
  }

  // ---- Video upload ----
  function populateSkillDropdown() {
    const sel    = document.getElementById('videoSkillId');
    const offers = mySkills.filter(s => s.type === 'offer');
    sel.innerHTML = offers.length
      ? offers.map(s => `<option value="${s.id}">${s.name}</option>`).join('')
      : '<option value="">No offered skills yet</option>';
  }

  function openVideoModal() {
    clearMsg('videoMsg');
    document.getElementById('videoTitle').value = '';
    document.getElementById('videoFile').value  = '';
    document.getElementById('uploadProgress').style.display = 'none';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('videoModal').classList.add('open');
  }
  function closeVideoModal() { document.getElementById('videoModal').classList.remove('open'); }

  async function uploadVideo() {
    const skill_id = document.getElementById('videoSkillId').value;
    const title    = document.getElementById('videoTitle').value.trim();
    const file     = document.getElementById('videoFile').files[0];
    if (!skill_id) { showError('videoMsg', 'Please add an offered skill first.'); return; }
    if (!title)    { showError('videoMsg', 'Please enter a video title.'); return; }
    if (!file)     { showError('videoMsg', 'Please select a video file.'); return; }

    document.getElementById('uploadProgress').style.display = 'block';
    const formData = new FormData();
    formData.append('user_id', me.id);
    formData.append('skill_id', skill_id);
    formData.append('title', title);
    formData.append('video', file);

    const xhr = new XMLHttpRequest();
    xhr.upload.addEventListener('progress', (e) => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('uploadPct').textContent = pct + '%';
      }
    });
    xhr.onload = () => {
      const data = JSON.parse(xhr.responseText);
      if (!data.success) { showError('videoMsg', data.error); document.getElementById('uploadProgress').style.display = 'none'; return; }
      closeVideoModal();
      showToast('Video uploaded!', 'success');
      loadMyVideos();
    };
    xhr.onerror = () => showError('videoMsg', 'Upload failed. Try again.');
    xhr.open('POST', 'http://localhost:3000/api/videos/upload');
    xhr.send(formData);
  }

  // ---- My Videos ----
  async function loadMyVideos() {
    showSpinner('myVideoList');
    const offers = mySkills.filter(s => s.type === 'offer');
    if (offers.length === 0) {
      document.getElementById('myVideoList').innerHTML =
        `<div class="empty-state" style="padding:20px 0;">
           <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:2em;height:2em;display:block;margin:0 auto"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div>
           <h3>No videos yet</h3>
           <p>Add an offered skill first, then upload video lectures for it.</p>
         </div>`;
      return;
    }
    let allVideos = [];
    for (const skill of offers) {
      const data = await apiCall('/videos?skill_id=' + skill.id);
      if (data.success) {
        data.videos.forEach(v => { v.skill_name = skill.name; });
        allVideos = allVideos.concat(data.videos);
      }
    }
    if (allVideos.length === 0) {
      document.getElementById('myVideoList').innerHTML =
        `<div class="empty-state" style="padding:20px 0;">
           <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:2em;height:2em;display:block;margin:0 auto"><path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3Z"/><path d="m6.2 5.3 3.1 3.9"/><path d="m12.4 3.4 3.1 3.9"/><path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg></div>
           <h3>No videos uploaded</h3>
           <p>Click "Upload Video" to share your knowledge!</p>
         </div>`;
      return;
    }
    document.getElementById('myVideoList').innerHTML = allVideos.map(v => `
      <div class="video-card">
        <video controls>
          <source src="http://localhost:3000/uploads/${v.filename}">
        </video>
        <div class="video-card-body">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <div class="video-title">${v.title}</div>
              <div class="video-meta">
                Skill: <span class="badge badge-offer">${v.skill_name}</span>
              </div>
            </div>
            <button class="btn btn-danger btn-sm" onclick="deleteVideo(${v.id})">Delete</button>
          </div>
        </div>
      </div>`).join('');
  }

  async function deleteVideo(videoId) {
    if (!confirm('Delete this video?')) return;
    await apiCall('/videos/' + videoId, 'DELETE', { user_id: me.id });
    showToast('Video deleted.');
    loadMyVideos();
  }

  renderProfile();
  loadSkills().then(() => loadMyVideos());
</script>
</body>
</html>
