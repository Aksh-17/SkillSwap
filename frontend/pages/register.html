<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — SkillSwap</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1.1em;height:1.1em;vertical-align:-0.15em;display:inline-block"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><polyline points="21 3 21 8 16 8"/><polyline points="3 21 3 16 8 16"/></svg> SkillSwap</div>
    <div class="auth-title">Create your account</div>
    <div class="auth-sub">Start swapping skills today — completely free</div>

    <div id="message"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="e.g. Riya Sharma" maxlength="100" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" maxlength="100" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Choose a password" maxlength="100">
    </div>
    <div class="form-group">
      <label>City <span style="font-weight:400;color:var(--text-3)">(optional)</span></label>
      <input type="text" id="location" placeholder="e.g. Delhi" maxlength="100">
    </div>

    <button class="btn btn-primary btn-full btn-lg" onclick="register()" id="regBtn">
      Create Account
    </button>

    <div class="auth-divider">or</div>

    <p style="text-align:center;font-size:13.5px;color:var(--text-2);">
      Already have an account?
      <a href="/pages/login.html" style="font-weight:600;">Sign in →</a>
    </p>
  </div>
</div>

<script src="../app.js"></script>
<script>
  buildNavbar('register');
  async function register() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const location = document.getElementById('location').value.trim();
    const btn      = document.getElementById('regBtn');
    if (!name || !email || !password) { showError('message', 'Please fill all required fields.'); return; }
    btn.textContent = 'Creating account…';
    btn.disabled = true;
    const data = await apiCall('/auth/register', 'POST', { name, email, password, location });
    if (!data.success) {
      showError('message', data.error);
      btn.textContent = 'Create Account';
      btn.disabled = false;
      return;
    }
    saveUser(data.user);
    window.location.href = '/pages/profile.html';
  }
</script>
</body>
</html>
