<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SkillSwap</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1.1em;height:1.1em;vertical-align:-0.15em;display:inline-block"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><polyline points="21 3 21 8 16 8"/><polyline points="3 21 3 16 8 16"/></svg> SkillSwap</div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to your account to continue</div>

    <div id="message"></div>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
    </div>

    <button class="btn btn-primary btn-full btn-lg" onclick="login()" id="loginBtn">
      Sign in
    </button>

    <div class="auth-divider">or</div>

    <p style="text-align:center;font-size:13.5px;color:var(--text-2);">
      Don't have an account?
      <a href="/pages/register.html" style="font-weight:600;">Create one free →</a>
    </p>
  </div>
</div>

<script src="../app.js"></script>
<script>
  buildNavbar('login');

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn      = document.getElementById('loginBtn');
    if (!email || !password) { showError('message', 'Please enter your email and password.'); return; }
    btn.textContent = 'Signing in…';
    btn.disabled = true;
    const data = await apiCall('/auth/login', 'POST', { email, password });
    if (!data.success) {
      showError('message', data.error);
      btn.textContent = 'Sign in';
      btn.disabled = false;
      return;
    }
    saveUser(data.user);
    window.location.href = '/pages/browse.html';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
